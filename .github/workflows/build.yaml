name: Continuous Integration

# Trigger the workflow on pushes or pull requests to the main branch
on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build-and-test:
    # Run this job on an Ubuntu Linux runner
    runs-on: ubuntu-latest

    steps:
    # Step 1: Check out the repository code onto the runner
    - name: Check out repository code
      uses: actions/checkout@v4

    # Step 2: Install Node.js on the runner environment
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    # Step 3: Install dependencies and run tests
    - name: Install dependencies and test
      working-directory: source-code
      run: |
        npm ci
        npm test

  docker:
    runs-on: ubuntu-latest
    steps:

    - name: Login to Docker Hub
      uses: docker/login-action@v4
      with:
        username: ${{ vars.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4

    - name: Build and push
      uses: docker/build-push-action@v7
      with:
        context: .
        push: true
        tags: user/app:latest
